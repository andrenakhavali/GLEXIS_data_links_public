<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GLEXIS Data Links</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">IIASA S3 link catalog</p>
        <h1>GLEXIS Data Links</h1>
      </div>
      <a class="source-link" href="https://s3.iiasa.ac.at/accelerator-prod/glexis/" target="_blank" rel="noopener">S3 root</a>
    </header>

    <main class="layout">
      <aside class="sidebar" aria-label="Datasets">
        <div class="dataset-tabs" id="datasetTabs"></div>
        <dl class="stats" id="stats"></dl>
        <a class="download-list" id="downloadList" href="#" download>Path list</a>
      </aside>

      <section class="browser" aria-label="File browser">
        <div class="browser-toolbar">
          <label class="search-label" for="searchInput">Search</label>
          <input id="searchInput" type="search" placeholder="Path or filename" autocomplete="off">
          <button id="clearSearch" type="button">Clear</button>
        </div>

        <div class="status-line" id="statusLine">Loading catalog...</div>
        <div class="search-results" id="searchResults" hidden></div>
        <div class="tree" id="tree"></div>
      </section>
    </main>

    <script src="assets/app.js" defer></script>
  </body>
</html>
